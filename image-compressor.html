<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Image Compressor Pro v2.0</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:900px;
background:#1e293b;
padding:25px;
border-radius:15px;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

h1{
text-align:center;
margin-bottom:20px;
}

.drop-zone{
border:2px dashed #38bdf8;
padding:30px;
text-align:center;
cursor:pointer;
border-radius:10px;
margin-bottom:20px;
}

.preview-area{
display:flex;
gap:20px;
margin-top:20px;
}

.preview-box{
flex:1;
background:#0f172a;
padding:10px;
border-radius:10px;
text-align:center;
}

.preview-box img{
max-width:100%;
max-height:250px;
}

.controls{
margin-top:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

input,select{
padding:8px;
border-radius:5px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
background:#38bdf8;
color:black;
font-weight:bold;
}

button:hover{
background:#0ea5e9;
}

.footer{
margin-top:15px;
text-align:center;
font-size:14px;
color:#94a3b8;
}

  @media (max-width:768px){

.container{
width:95%;
padding:15px;
}

.preview-area{
flex-direction:column;
}

.controls{
grid-template-columns:1fr;
}

button{
width:100%;
margin-top:5px;
}

.drop-zone{
padding:20px;
}

.preview-box img{
max-height:180px;
}

  }
  
</style>
  
</head>
  
<body>

<div class="container">
<h1>Image Compressor Pro v2.0</h1>

<div class="drop-zone" id="dropZone">
Click or Drag Image Here
<input type="file" id="fileInput" hidden>
</div>

<div class="preview-area">
<div class="preview-box">
<h3>Original</h3>
<div id="originalPreview"></div>
<p id="originalSize"></p>
</div>

<div class="preview-box">
<h3>Compressed</h3>
<div id="compressedPreview"></div>
<p id="compressedSize"></p>
</div>
</div>

<div class="controls">
<div>
<label>Quality (JPG/WEBP)</label>
<input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.8">
</div>
<div>
<label>Target Size (KB)</label>
<input type="number" id="targetKB" placeholder="Enter KB">
</div>
<div>
<label>Format</label>
<select id="format">
<option value="image/jpeg">JPG</option>
<option value="image/webp">WEBP</option>
<option value="image/png">PNG</option>
</select>
</div>
<div id="resizeSection" style="display:none; margin-top:15px;">

<div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; background:#0f172a; padding:15px; border-radius:10px;">

<div>
<label>Resize Unit</label>
<select id="unit" style="width:100%;">
<option value="px">Pixel</option>
<option value="mm">Millimeter</option>
<option value="cm">Centimeter</option>
</select>
</div>

<div>
<label>DPI (mm/cm only)</label>
<input type="number" id="dpi" value="300" style="width:100%;">
</div>

<div style="display:flex; gap:10px;">

<div style="flex:1;">
<label>Width (<span id="unitLabelW">px</span>)</label>
<input type="number" id="width">
</div>

<div style="flex:1;">
<label>Height (<span id="unitLabelH">px</span>)</label>
<input type="number" id="height">
</div>

</div>

<div style="grid-column:1/3;">
<label>
<input type="checkbox" id="ratio" checked>
Maintain Aspect Ratio
</label>
</div>
<label>Target Size (KB)</label>
<input type="number" id="singleTargetKB" placeholder="Enter KB">
</div>
<button type="button" onclick="resizeSelectedImage()" style="margin-top:10px; width:100%;">
Resize Selected Image
</button>
</div>
<div>
 <button type="button" onclick="toggleResize()">Resize</button>
<button onclick="compressImage()">Compress</button>
<button onclick="downloadImage()">Download</button>
<button onclick="downloadAll()">Download All(ZIP)</button>
<button onclick="resetAll()">Reset</button>
</div>

</div>

<div class="footer">
Professional Image Compressor – Upgrade Edition
</div>

</div>

<script>

let images = [];
let selectedIndex = null;
let compressedImages = [];

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
fileInput.multiple = true;

// Toggle Resize Panel
function toggleResize(){
let section = document.getElementById("resizeSection");

if(section.style.display === "none"){
section.style.display = "block";
}else{
section.style.display = "none";
}
}

// Upload
dropZone.onclick = () => fileInput.click();

fileInput.onchange = function(e){
handleFiles(e.target.files);
};

function handleFiles(files){

images=[];
compressedImages=[];

document.getElementById("originalPreview").innerHTML="";
document.getElementById("compressedPreview").innerHTML="";

Array.from(files).forEach(file=>{

let reader=new FileReader();

reader.onload=function(e){

let img=new Image();

img.onload=function(){

images.push({file,img});

let container=document.createElement("div");
container.style.background="#1e293b";
container.style.padding="10px";
container.style.margin="10px 0";
container.style.borderRadius="8px";

let preview=document.createElement("img");
preview.src=img.src;
preview.style.maxWidth="120px";
preview.style.display="block";
preview.style.marginBottom="5px";

let info=document.createElement("div");
info.style.fontSize="13px";
info.innerHTML=`
<b>Name:</b> ${file.name}<br>
<b>Width:</b> ${img.width}px<br>
<b>Height:</b> ${img.height}px<br>
<b>DPI:</b> ${document.getElementById("dpi").value}<br>
<b>Size:</b> ${(file.size/1024).toFixed(2)} KB
`;

container.appendChild(preview);
container.appendChild(info);

document.getElementById("originalPreview").appendChild(container);
container.style.cursor="pointer";

container.onclick=function(){

// remove previous selection border
document.querySelectorAll("#originalPreview div").forEach(d=>{
d.style.border="none";
});

container.style.border="2px solid #38bdf8";

selectedIndex = images.findIndex(i=>i.file.name===file.name);

loadImageData(file);

};
};

img.src=e.target.result;

};

reader.readAsDataURL(file);
  
});

}

  
function loadImageData(file){

let img = new Image();
img.onload = function(){

let dpi = 300; // default dpi
document.getElementById("dpi").value = dpi;

let unit = document.getElementById("unit").value;

if(unit === "px"){
document.getElementById("width").value = img.width;
document.getElementById("height").value = img.height;
}
else if(unit === "mm"){
document.getElementById("width").value = ((img.width/dpi)*25.4).toFixed(2);
document.getElementById("height").value = ((img.height/dpi)*25.4).toFixed(2);
}
else if(unit === "cm"){
document.getElementById("width").value = ((img.width/dpi)*2.54).toFixed(2);
document.getElementById("height").value = ((img.height/dpi)*2.54).toFixed(2);
}

};

img.src = URL.createObjectURL(file);
}
document.getElementById("unit").addEventListener("change", function(){

let unit = this.value;
let dpi = parseFloat(document.getElementById("dpi").value);

let w = parseFloat(document.getElementById("width").value);
let h = parseFloat(document.getElementById("height").value);

let unitLabelW = document.getElementById("unitLabelW");
let unitLabelH = document.getElementById("unitLabelH");

unitLabelW.innerText = unit;
unitLabelH.innerText = unit;

if(!w || !h) return;

if(unit === "px"){
document.getElementById("width").value = Math.round((w/25.4)*dpi);
document.getElementById("height").value = Math.round((h/25.4)*dpi);
}
else if(unit === "mm"){
document.getElementById("width").value = ((w/dpi)*25.4).toFixed(2);
document.getElementById("height").value = ((h/dpi)*25.4).toFixed(2);
}
else if(unit === "cm"){
document.getElementById("width").value = ((w/dpi)*2.54).toFixed(2);
document.getElementById("height").value = ((h/dpi)*2.54).toFixed(2);
}

});
  
// Convert
function convertToPx(value){

let unit=document.getElementById("unit").value;
let dpi=document.getElementById("dpi").value;

if(unit==="px") return value;
if(unit==="mm") return (value/25.4)*dpi;
if(unit==="cm") return (value/2.54)*dpi;

}

// Compress All
async function compressImage(){

compressedImages=[];
document.getElementById("compressedPreview").innerHTML="";

let format=document.getElementById("format").value;
let quality=document.getElementById("quality").value;
let targetKB=document.getElementById("targetKB").value;

for(let item of images){

let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

let w=item.img.width;
let h=item.img.height;

if(document.getElementById("resizeSection").style.display==="block"){

w=convertToPx(document.getElementById("width").value);
h=convertToPx(document.getElementById("height").value);

}

canvas.width=w;
canvas.height=h;

ctx.drawImage(item.img,0,0,w,h);

let blob;

if(targetKB){

let targetBytes=targetKB*1024;

for(let q=0.9;q>0.1;q-=0.05){

blob=await new Promise(r=>canvas.toBlob(r,format,q));

if(blob.size<=targetBytes) break;

}

}else{

blob=await new Promise(r=>canvas.toBlob(r,format,quality));

}

compressedImages.push({name:item.file.name,blob});

let container=document.createElement("div");
container.style.background="#1e293b";
container.style.padding="10px";
container.style.margin="10px 0";
container.style.borderRadius="8px";

let imgPreview=document.createElement("img");
imgPreview.src=URL.createObjectURL(blob);
imgPreview.style.maxWidth="120px";
imgPreview.style.display="block";
imgPreview.style.marginBottom="5px";

let info=document.createElement("div");
info.style.fontSize="13px";
info.innerHTML=`
<b>Name:</b> ${item.file.name}<br>
<b>Width:</b> ${w}px<br>
<b>Height:</b> ${h}px<br>
<b>DPI:</b> ${document.getElementById("dpi").value}<br>
<b>Size:</b> ${(blob.size/1024).toFixed(2)} KB
`;

container.appendChild(imgPreview);
container.appendChild(info);

document.getElementById("compressedPreview").appendChild(container);
}

}

// Download Single
function downloadImage(){

if(compressedImages.length===0) return alert("Compress first");

compressedImages.forEach(item=>{

let a=document.createElement("a");
a.href=URL.createObjectURL(item.blob);
a.download="compressed_"+item.name;
a.click();

});

}

// Download All ZIP
async function downloadAll(){

if(compressedImages.length===0) return alert("Compress first");

let zip=new JSZip();

compressedImages.forEach(item=>{
zip.file("compressed_"+item.name,item.blob);
});

let content=await zip.generateAsync({type:"blob"});

let a=document.createElement("a");
a.href=URL.createObjectURL(content);
a.download="All_Compressed_Images.zip";
a.click();

}

  async function resizeSelectedImage(){

if(selectedIndex === null){
alert("Select an image first");
return;
}

let item = images[selectedIndex];

let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

let w=item.img.width;
let h=item.img.height;

if(document.getElementById("resizeSection").style.display==="block"){

w=convertToPx(document.getElementById("width").value);
h=convertToPx(document.getElementById("height").value);

}

canvas.width=w;
canvas.height=h;

ctx.drawImage(item.img,0,0,w,h);

let format=document.getElementById("format").value;
let quality=document.getElementById("quality").value;
let targetKB=document.getElementById("singleTargetKB").value;

let blob;

if(targetKB){

let targetBytes=targetKB*1024;

for(let q=0.9;q>0.1;q-=0.05){

blob=await new Promise(r=>canvas.toBlob(r,format,q));

if(blob.size<=targetBytes) break;

}

}else{

blob=await new Promise(r=>canvas.toBlob(r,format,quality));

}

let container=document.createElement("div");
container.style.background="#1e293b";
container.style.padding="10px";
container.style.margin="10px 0";
container.style.borderRadius="8px";

let imgPreview=document.createElement("img");
imgPreview.src=URL.createObjectURL(blob);
imgPreview.style.maxWidth="120px";
imgPreview.style.display="block";
imgPreview.style.marginBottom="5px";

let info=document.createElement("div");
info.style.fontSize="13px";
info.innerHTML=`
<b>Name:</b> ${item.file.name}<br>
<b>Width:</b> ${w}px<br>
<b>Height:</b> ${h}px<br>
<b>DPI:</b> ${document.getElementById("dpi").value}<br>
<b>Size:</b> ${(blob.size/1024).toFixed(2)} KB
`;

container.appendChild(imgPreview);
container.appendChild(info);

document.getElementById("compressedPreview").innerHTML="";
document.getElementById("compressedPreview").appendChild(container);

  }
</script>

</body>
</html>
